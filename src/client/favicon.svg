<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Violet square background -->
  <rect width="64" height="64" rx="8" fill="#7c3aed"/>
  
  <!-- Smartphone icon -->
  <g transform="translate(12, 10)">
    <!-- Phone body -->
    <rect x="2" y="0" width="36" height="44" rx="3" fill="white" stroke="none"/>
    <!-- Phone screen -->
    <rect x="4" y="2" width="32" height="36" rx="2" fill="#020617"/>
    <!-- Home button -->
    <circle cx="20" cy="41" r="1.5" fill="white"/>
  </g>
</svg>
